<!-- index.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportX Pro</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="bg-slate-900 text-white sticky top-0 z-50 shadow-lg">
<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

<h1 class="text-3xl font-black cursor-pointer">
Sport<span class="text-blue-500">X</span> Pro
</h1>

<div class="flex gap-3 items-center">

<input
id="search"
type="text"
placeholder="Tìm sản phẩm..."
class="px-4 py-2 rounded-xl text-black w-52 md:w-64"
/>

<button onclick="openCart()"
class="relative bg-blue-600 px-4 py-2 rounded-xl hover:bg-blue-700">

🛒

<span id="cartCount"
class="absolute -top-2 -right-2 bg-red-500 text-xs w-5 h-5 rounded-full flex items-center justify-center">
0
</span>

</button>

</div>
</div>
</header>

<!-- BANNER -->
<section class="bg-blue-600 text-white text-center py-16">
<h2 class="text-5xl font-black mb-3">SPORT QVA STORE</h2>
<p>Mua sắm thể thao chuyên nghiệp</p>
</section>

<!-- CATEGORY -->
<section class="bg-white shadow py-5">
<div
id="categoryList"
class="max-w-7xl mx-auto px-4 flex gap-3 overflow-x-auto">
</div>
</section>

<!-- PRODUCTS -->
<section class="max-w-7xl mx-auto px-4 py-8">

<div
id="productList"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
</div>

<div
id="pagination"
class="flex justify-center gap-2 mt-10 flex-wrap">
</div>

</section>

<!-- CART -->
<div
id="cartModal"
class="fixed inset-0 bg-black/60 hidden z-50">

<div
class="bg-white w-full max-w-xl h-full absolute right-0 p-6 overflow-y-auto">

<div class="flex justify-between items-center mb-5">
<h2 class="text-2xl font-bold">Giỏ hàng</h2>

<button onclick="closeCart()"
class="text-red-500 text-2xl">
✖
</button>
</div>

<div id="cartItems"></div>

<div class="border-t pt-5 mt-5">

<h3 class="text-xl font-bold mb-4">
Tổng tiền:
<span id="total">0đ</span>
</h3>

<button
onclick="showForm()"
class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">
Xác nhận đơn hàng
</button>

</div>

<!-- FORM -->
<div id="orderForm" class="hidden mt-6">

<input
id="name"
placeholder="Họ và tên"
class="form-input">

<input
id="phone"
placeholder="Số điện thoại"
class="form-input">

<input
id="email"
placeholder="Email"
class="form-input">

<textarea
id="address"
placeholder="Địa chỉ"
class="form-input h-28"></textarea>

<button
onclick="submitOrder()"
class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">
Gửi đơn hàng
</button>

</div>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
